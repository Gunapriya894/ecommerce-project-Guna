<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GU Commerce — Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050810; --panel: #0b0f1a; --panel2: #0f1420;
      --border: #1a2540; --accent: #f72585; --accent2: #00f5d4;
      --text: #c8d6f0; --muted: #4a5a7a; --success: #06d6a0; --error: #ef233c;
    }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; visibility: hidden; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(247,37,133,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(247,37,133,0.025) 1px, transparent 1px); background-size: 48px 48px; pointer-events: none; z-index: 0; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; height: 60px; background: rgba(5,8,16,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); }
    .nav-logo { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 0.95rem; letter-spacing: 4px; color: var(--accent2); text-decoration: none; }
    .nav-links { display: flex; gap: 2rem; }
    .nav-links a { font-family: 'Share Tech Mono', monospace; font-size: 0.72rem; color: var(--muted); text-decoration: none; letter-spacing: 2px; text-transform: uppercase; transition: color 0.2s; }
    .nav-links a:hover { color: var(--accent2); }
    .nav-links a.active { color: var(--accent); }
    .nav-right { display: flex; align-items: center; gap: 1rem; }
    .user-chip { display: flex; align-items: center; gap: 7px; font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--muted); padding: 4px 10px; border: 1px solid var(--border); }
    .user-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s ease-in-out infinite; }
    .user-chip #navUsername { color: var(--accent2); }
    .btn-logout { font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); background: transparent; border: 1px solid rgba(74,90,122,0.4); padding: 4px 10px; cursor: pointer; transition: all 0.2s; }
    .btn-logout:hover { color: var(--accent); border-color: rgba(247,37,133,0.4); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .container { position: relative; z-index: 1; max-width: 1000px; margin: 0 auto; padding: 80px 2rem 4rem; }
    .page-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
    .page-eyebrow { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-bottom: 0.4rem; }
    .page-title { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 2rem; color: #fff; }
    .btn { font-family: 'Share Tech Mono', monospace; font-size: 0.73rem; letter-spacing: 2px; text-transform: uppercase; padding: 10px 22px; border: none; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
    .btn-pink { background: var(--accent); color: #fff; }
    .btn-pink:hover { box-shadow: 0 0 20px rgba(247,37,133,0.45); transform: translateY(-1px); }
    .filter-bar { display: flex; gap: 0.8rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .filter-bar label { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; }
    .filter-bar input { padding: 8px 14px; background: var(--panel); border: 1px solid var(--border); color: var(--text); font-family: 'Share Tech Mono', monospace; font-size: 0.8rem; outline: none; transition: border-color 0.2s; min-width: 220px; }
    .filter-bar input:focus { border-color: var(--accent); }
    .filter-bar input::placeholder { color: var(--muted); }
    .state-box { text-align: center; padding: 4rem 2rem; border: 1px dashed var(--border); color: var(--muted); font-family: 'Share Tech Mono', monospace; font-size: 0.75rem; letter-spacing: 2px; }
    .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to{transform:rotate(360deg)} }
    .carts-list { display: flex; flex-direction: column; gap: 1.2rem; }
    .cart-block { background: var(--panel); border: 1px solid var(--border); transition: border-color 0.2s; overflow: hidden; }
    .cart-block:hover { border-color: rgba(247,37,133,0.3); }
    .cart-block-header { display: flex; align-items: center; justify-content: space-between; padding: 1.2rem 1.5rem; background: rgba(247,37,133,0.04); border-bottom: 1px solid var(--border); cursor: pointer; }
    .cart-user { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 1rem; color: #fff; display: flex; align-items: center; gap: 10px; }
    .cart-user::before { content: '🛒'; font-size: 1.1rem; }
    .cart-block.my-cart { border-color: rgba(247,37,133,0.4); }
    .cart-block.my-cart .cart-block-header { background: rgba(247,37,133,0.07); }
    .my-cart-badge { font-family: 'Share Tech Mono', monospace; font-size: 0.6rem; letter-spacing: 2px; color: var(--accent2); padding: 2px 8px; border: 1px solid rgba(0,245,212,0.3); background: rgba(0,245,212,0.06); }
    .cart-meta { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; color: var(--muted); display: flex; gap: 1.2rem; align-items: center; }
    .cart-badge { padding: 3px 10px; border: 1px solid rgba(247,37,133,0.3); color: var(--accent); font-size: 0.65rem; }
    .toggle-icon { transition: transform 0.2s; }
    .cart-block.collapsed .toggle-icon { transform: rotate(-90deg); }
    .cart-items-wrap { padding: 1.2rem 1.5rem; }
    .cart-block.collapsed .cart-items-wrap { display: none; }
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table th { font-family: 'Share Tech Mono', monospace; font-size: 0.62rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; text-align: left; padding: 6px 10px 10px; border-bottom: 1px solid var(--border); }
    .items-table td { font-size: 0.9rem; padding: 10px; border-bottom: 1px solid rgba(26,37,64,0.5); vertical-align: middle; }
    .items-table tr:last-child td { border-bottom: none; }
    .item-name { color: #fff; font-weight: 600; }
    .item-price { font-family: 'Share Tech Mono', monospace; color: var(--accent2); font-size: 0.85rem; }
    .item-qty { font-family: 'Share Tech Mono', monospace; color: var(--accent); font-size: 0.85rem; background: rgba(247,37,133,0.08); padding: 2px 10px; border: 1px solid rgba(247,37,133,0.2); display: inline-block; }
    .cart-total { display: flex; justify-content: flex-end; align-items: center; gap: 1rem; margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
    .total-label { font-family: 'Share Tech Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; }
    .total-val { font-family: 'Orbitron', monospace; font-weight: 700; font-size: 1.1rem; color: var(--accent2); }
    .summary-row { display: flex; gap: 2rem; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .summary-chip { font-family: 'Share Tech Mono', monospace; font-size: 0.68rem; letter-spacing: 2px; padding: 6px 14px; border: 1px solid var(--border); color: var(--muted); }
    .summary-chip span { color: var(--accent); margin-left: 6px; }
  </style>
</head>
<body>
  <nav>
    <a href="index.html" class="nav-logo">GU::COMMERCE</a>
    <div class="nav-links">
      <a href="product.html">Products</a>
      <a href="cart.html" class="active">Cart</a>
      <a href="recommendation.html">Recs</a>
    </div>
    <div class="nav-right">
      <div class="user-chip">
        <div class="user-dot"></div>
        <span id="navUsername">—</span>
      </div>
      <button class="btn-logout" onclick="doLogout()">⏻ Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="page-header">
      <div>
        <div class="page-eyebrow">SVC-002 · CART SERVICE</div>
        <div class="page-title">Shopping Carts</div>
      </div>
      <div style="display:flex;gap:1rem;">
        <button class="btn btn-pink" onclick="loadCarts()">🛒 View Cart</button>
      </div>
    </div>

    <div class="filter-bar">
      <label>FILTER BY USER:</label>
      <input id="filterInput" placeholder="Type user ID to filter..." oninput="filterCarts()"/>
    </div>

    <div id="cartContainer">
      <div class="state-box">
        Click <strong style="color:var(--accent)">VIEW CART</strong> to load cart data from DynamoDB
      </div>
    </div>
  </div>

  <!-- common.js provides: CART_URL, auth guard, doLogout(), GU_USER -->
  <script src="common.js"></script>
  <script>
    let allCarts   = [];
    let currentUser = '';

    // Read current user from common.js after auth guard runs
    try {
      currentUser = (window.GU_USER && window.GU_USER.username) ? window.GU_USER.username : '';
      document.getElementById('filterInput').value = currentUser;
    } catch (e) { console.error('Init error:', e); }

    // ── Load all carts ─────────────────────────────────────────────────────────
    async function loadCarts() {
      const container = document.getElementById('cartContainer');
      try {
        container.innerHTML = `<div class="state-box"><div class="spinner"></div>LOADING CART DATA...</div>`;
        document.getElementById('filterInput').value = '';

        const res = await fetch(CART_URL);
        if (!res.ok) throw new Error(`Server error: HTTP ${res.status}`);

        allCarts = await res.json();

        if (!allCarts.length) {
          container.innerHTML = `<div class="state-box">NO CART ENTRIES FOUND — ADD ITEMS VIA PRODUCT PAGE</div>`;
          return;
        }

        renderCarts(allCarts);

      } catch (e) {
        container.innerHTML = `<div class="state-box" style="color:var(--error)">ERROR: ${e.message}</div>`;
        console.error('loadCarts error:', e);
      }
    }

    // ── Filter carts by user input ─────────────────────────────────────────────
    function filterCarts() {
      try {
        const q        = document.getElementById('filterInput').value.toLowerCase();
        const filtered = q ? allCarts.filter(c => (c.user || '').toLowerCase().includes(q)) : allCarts;
        renderCarts(filtered);
      } catch (e) { console.error('filterCarts error:', e); }
    }

    // ── Render cart list ───────────────────────────────────────────────────────
    function renderCarts(carts) {
      try {
        const container  = document.getElementById('cartContainer');
        const totalItems = carts.reduce((s, c) => s + (c.items || []).length, 0);
        const totalQty   = carts.reduce((s, c) =>
          s + (c.items || []).reduce((si, i) => si + (Number(i.quantity) || 1), 0), 0);

        // Sort: logged-in user's cart always appears first
        const sorted = [...carts].sort((a, b) => {
          if (a.user === currentUser) return -1;
          if (b.user === currentUser) return  1;
          return 0;
        });

        let html = `
          <div class="summary-row">
            <div class="summary-chip">USERS <span>${carts.length}</span></div>
            <div class="summary-chip">PRODUCT LINES <span>${totalItems}</span></div>
            <div class="summary-chip">TOTAL UNITS <span>${totalQty}</span></div>
          </div>
          <div class="carts-list">`;

        sorted.forEach((cart, idx) => {
          try {
            const items      = cart.items || [];
            const itemCount  = items.length;
            const totalUnits = items.reduce((s, i) => s + (Number(i.quantity) || 1), 0);
            const cartTotal  = items.reduce((s, i) => s + (Number(i.price) || 0) * (Number(i.quantity) || 1), 0);
            const isMe       = cart.user === currentUser;

            html += `
              <div class="cart-block${isMe ? ' my-cart' : ''}" id="cb_${idx}">
                <div class="cart-block-header" onclick="toggleCart(${idx})">
                  <div class="cart-user">
                    ${cart.user || 'Unknown'}
                    ${isMe ? '<span class="my-cart-badge">YOUR CART</span>' : ''}
                  </div>
                  <div class="cart-meta">
                    <span>${itemCount} product${itemCount !== 1 ? 's' : ''}</span>
                    <span>${totalUnits} unit${totalUnits !== 1 ? 's' : ''}</span>
                    <span class="cart-badge">${cartTotal > 0 ? '₹' + cartTotal.toLocaleString('en-IN') : 'N/A'}</span>
                    <span class="toggle-icon">▾</span>
                  </div>
                </div>
                <div class="cart-items-wrap">
                  ${renderItemsTable(items, cartTotal)}
                </div>
              </div>`;
          } catch (e) { console.error('Cart block render error:', e); }
        });

        html += '</div>';
        container.innerHTML = html;

      } catch (e) {
        console.error('renderCarts error:', e);
      }
    }

    // ── Render items table inside a cart block ─────────────────────────────────
    function renderItemsTable(items, cartTotal) {
      try {
        if (!items.length) return `<div style="color:var(--muted);font-family:'Share Tech Mono',monospace;font-size:0.75rem;">No items</div>`;

        const rows = items.map(item => {
          const qty      = Number(item.quantity) || 1;
          const price    = Number(item.price)    || 0;
          const subtotal = price * qty;
          return `<tr>
            <td class="item-name">${item.name  || '—'}</td>
            <td class="item-price">${price    > 0 ? '₹' + price.toLocaleString('en-IN')    : '—'}</td>
            <td><span class="item-qty">× ${qty}</span></td>
            <td class="item-price">${subtotal > 0 ? '₹' + subtotal.toLocaleString('en-IN') : '—'}</td>
          </tr>`;
        }).join('');

        return `
          <table class="items-table">
            <thead><tr>
              <th>PRODUCT</th><th>UNIT PRICE</th><th>QTY</th><th>SUBTOTAL</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
          ${cartTotal > 0 ? `
            <div class="cart-total">
              <span class="total-label">CART TOTAL</span>
              <span class="total-val">₹${cartTotal.toLocaleString('en-IN')}</span>
            </div>` : ''}`;

      } catch (e) {
        console.error('renderItemsTable error:', e);
        return `<div style="color:var(--error)">Error rendering items</div>`;
      }
    }

    // ── Toggle cart collapse ───────────────────────────────────────────────────
    function toggleCart(idx) {
      try {
        document.getElementById('cb_' + idx).classList.toggle('collapsed');
      } catch (e) { console.error('toggleCart error:', e); }
    }
  </script>
</body>
</html>
