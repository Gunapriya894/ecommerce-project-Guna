name: GU Commerce Deploy Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # ← ADD THIS LINE — fixes Node.js warning

jobs:

  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # stays same — Node24 env var above fixes warning

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pytest boto3

      - name: Run Tests
        run: python -m pytest tests/ -v

  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.6.3"   # ← your version

      - name: Zip guproduct Lambda
        run: cd guproduct && zip -r lambda_function.zip lambda_function.py

      - name: Zip gucart Lambda
        run: cd gucart && zip -r lambda_function.zip lambda_function.py

      - name: Zip gurecommend Lambda
        run: cd gurecommend && zip -r lambda_function.zip lambda_function.py

      - name: Zip gulogu Lambda
        run: cd gulogu && zip -r lambda_function.zip lambda_auth.py

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        run: terraform apply -auto-approve

      - name: Deploy Frontend to S3
        run: |
          aws s3 sync frontend/ s3://gu-commerce-frontend-5766d0a6/ \
            --delete \
            --cache-control "max-age=300"

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E350AOEM6ZRZKL \
            --paths "/*"