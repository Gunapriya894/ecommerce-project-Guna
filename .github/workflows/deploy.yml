# ── GU Commerce · CI/CD Pipeline ──────────────────────────────────────────────
# Triggered on every push to the main branch
# Steps: Test → Zip Lambdas → Terraform Apply
# ──────────────────────────────────────────────────────────────────────────────

name: GU Commerce Deploy Pipeline

on:
  push:
    branches:
      - main          # runs when you push to main branch
  pull_request:
    branches:
      - main          # also runs on pull requests to main (tests only)

jobs:

  # ── JOB 1: Run Unit Tests ───────────────────────────────────────────────────
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest     # GitHub provides a fresh Ubuntu machine

    steps:

      # Step 1: Download your code onto the GitHub machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Install Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install pytest
      - name: Install Dependencies
        run: pip install pytest boto3

      # Step 4: Run all 107 tests
      - name: Run Tests
        run: python -m pytest tests/ -v

  # ── JOB 2: Deploy to AWS (only runs if tests pass) ──────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    needs: test           # ONLY runs if the test job above passed
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    # Only deploys on actual push to main — not on pull requests

    steps:

      # Step 1: Download your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Configure AWS credentials from GitHub Secrets
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # Step 3: Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "v1.14.7"   # use the same version you used locally

      # Step 4: Zip the guproduct Lambda
      - name: Zip guproduct Lambda
        run: |
          cd guproduct
          zip -r lambda_function.zip lambda_function.py
          cd ..

      # Step 5: Zip the gucart Lambda
      - name: Zip gucart Lambda
        run: |
          cd gucart
          zip -r lambda_function.zip lambda_function.py
          cd ..

      # Step 6: Zip the gurecommend Lambda
      - name: Zip gurecommend Lambda
        run: |
          cd gurecommend
          zip -r lambda_function.zip lambda_function.py
          cd ..

      # Step 7: Zip the gulogu (auth) Lambda
      - name: Zip gulogu Lambda
        run: |
          cd gulogu
          zip -r lambda_function.zip lambda_auth.py
          cd ..

      # Step 8: Initialise Terraform (downloads AWS provider)
      - name: Terraform Init
        run: terraform init

      # Step 9: Check terraform files have no syntax errors
      - name: Terraform Validate
        run: terraform validate

      # Step 10: Show what changes terraform WILL make (for logs)
      - name: Terraform Plan
        run: terraform plan

      # Step 11: Apply the changes — update AWS Lambda functions
      - name: Terraform Apply
        run: terraform apply -auto-approve
        # -auto-approve skips the "yes/no" prompt — needed for automation
        # Step 12: Deploy frontend files to S3
      - name: Deploy Frontend to S3
        run: |
          aws s3 sync frontend/ s3://gu-commerce-frontend-5766d0a6/ \
            --delete \
            --cache-control "max-age=300"

      # Step 13: Invalidate CloudFront cache so users see new files immediately
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E350AOEM6ZRZKL \
            --paths "/*"