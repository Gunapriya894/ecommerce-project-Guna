# ── GU Commerce · CI Pipeline ─────────────────────────────────────────────────
# Triggered on every push and pull request to main branch
# Jobs:
#   1. Backend Unit Tests  → runs all 107 pytest tests
#   2. Frontend Validation → checks all HTML files are well-formed
#   3. Backend Lint        → checks Python code quality
# No AWS deployment — deployment is handled manually via Terraform
# ──────────────────────────────────────────────────────────────────────────────

name: GU Commerce CI Pipeline

on:
  push:
    branches:
      - main          # runs on every push to main
  pull_request:
    branches:
      - main          # runs on every pull request to main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # suppresses Node.js deprecation warnings

jobs:

  # ── JOB 1: Backend Unit Tests ────────────────────────────────────────────────
  # Runs all 107 pytest tests for guproduct, gucart, gurecommend services
  backend-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:

      # Download your code onto GitHub's machine
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Python 3.11
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Install pytest and boto3 (needed by lambda code imports)
      - name: Install Dependencies
        run: pip install pytest boto3

      # Run all 107 unit tests
      - name: Run Unit Tests
        run: python -m pytest tests/ -v

      # Show a summary of results even if tests fail
      - name: Test Summary
        if: always()    # runs whether tests passed or failed
        run: python -m pytest tests/ --tb=short -q


  # ── JOB 2: Frontend Validation ───────────────────────────────────────────────
  # Checks that all HTML files in frontend/ are valid and well-formed
  frontend-validation:
    name: Frontend Validation
    runs-on: ubuntu-latest

    steps:

      # Download your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Install Node.js (needed for html-validate tool)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install html-validate — checks HTML files for errors
      - name: Install html-validate
        run: npm install -g html-validate

      # Check that all required frontend files exist
      - name: Check Frontend Files Exist
        run: |
          echo "Checking required frontend files..."
          test -f frontend/login.html          && echo "✓ login.html found"          || exit 1
          test -f frontend/index.html          && echo "✓ index.html found"          || exit 1
          test -f frontend/product.html        && echo "✓ product.html found"        || exit 1
          test -f frontend/cart.html           && echo "✓ cart.html found"           || exit 1
          test -f frontend/recommendation.html && echo "✓ recommendation.html found" || exit 1
          test -f frontend/common.js           && echo "✓ common.js found"           || exit 1
          echo "All frontend files present ✓"

      # Validate each HTML file for syntax errors
      - name: Validate HTML Files
        run: |
          echo "Validating HTML files..."
          html-validate frontend/login.html          && echo "✓ login.html valid"
          html-validate frontend/index.html          && echo "✓ index.html valid"
          html-validate frontend/product.html        && echo "✓ product.html valid"
          html-validate frontend/cart.html           && echo "✓ cart.html valid"
          html-validate frontend/recommendation.html && echo "✓ recommendation.html valid"
          echo "All HTML files valid ✓"

      # Check that common.js contains required functions
      - name: Validate common.js Contents
        run: |
          echo "Checking common.js has required content..."
          grep -q "BASE_URL"    frontend/common.js && echo "✓ BASE_URL defined"    || exit 1
          grep -q "CART_URL"    frontend/common.js && echo "✓ CART_URL defined"    || exit 1
          grep -q "PRODUCT_URL" frontend/common.js && echo "✓ PRODUCT_URL defined" || exit 1
          grep -q "REC_URL"     frontend/common.js && echo "✓ REC_URL defined"     || exit 1
          grep -q "authGuard"   frontend/common.js && echo "✓ authGuard defined"   || exit 1
          grep -q "doLogout"    frontend/common.js && echo "✓ doLogout defined"    || exit 1
          echo "common.js validation passed ✓"

